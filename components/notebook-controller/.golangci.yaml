# https://github.com/golangci/golangci-lint

# Newer Kubebuilder adds this as a default
# https://github.com/kubernetes-sigs/kubebuilder/issues/1887

version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    # - dupl          # TODO: fix duplicate code in tests
    - errcheck
    # - gocyclo       # TODO: reduce cyclomatic complexity in Reconcile functions
    - goconst
    - govet
    - ineffassign
    # - lll           # TODO: re-enable with a higher limit and proper exclusions
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    # - unparam       # TODO: fix unused function parameters in test helpers
    - unused
  # exclusions:
  #   rules:
  #     - path: "api/.*"
  #       linters:
  #         - lll
  #     - path: "internal/.*"
  #       linters:
  #         - dupl
  #         - lll

formatters:
  enable:
    - gofmt
    - goimports
