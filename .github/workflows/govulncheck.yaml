---
name: Go Vulnerability Check

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        component:
          - components/notebook-controller
          - components/odh-notebook-controller

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          check-latest: true
          go-version-file: ${{ matrix.component }}/go.mod
          cache-dependency-path: ${{ matrix.component }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: vulncheck
        run: |
          set -o pipefail
          go mod tidy
          # Generate JSON report (ignore exit code)
          govulncheck -json ./... > govulncheck-report.json || true
          # Generate text report - exit code propagates via pipefail
          govulncheck ./... | tee govulncheck-report.txt
        working-directory: ${{ matrix.component }}

      - name: Generate report summary
        if: always()
        run: |
          echo "## Vulnerability Report for ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ${{ matrix.component }}/govulncheck-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report-${{ matrix.component == 'components/notebook-controller' && 'notebook-controller' || 'odh-notebook-controller' }}
          path: |
            ${{ matrix.component }}/govulncheck-report.json
            ${{ matrix.component }}/govulncheck-report.txt
          retention-days: 30
